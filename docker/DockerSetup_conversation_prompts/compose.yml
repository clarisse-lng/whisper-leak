services:
  collector-1:
    build: .
    restart: 'no'
    cap_add:
    - NET_ADMIN
    - NET_RAW
    user: root
    env_file:
    - .env
    container_name: collector-1
    volumes:
    - ./data:/app/data
    - ./prompts/collector-1.json:/app/prompts/collector.json:ro
    command:
    - -c
    - GPT4oMini
    - -s
    - /app/prompts/collector.json
    - -o
    - data/collector-1
